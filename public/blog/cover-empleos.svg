<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg-emp" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#311248"/>
      <stop offset="0.5" stop-color="#491C6D"/>
      <stop offset="1" stop-color="#7A2EB5"/>
    </linearGradient>
    <radialGradient id="glow-emp" cx="0.85" cy="0.8" r="0.7">
      <stop offset="0" stop-color="#55BED9" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#55BED9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2-emp" cx="0.1" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#F4E10D" stop-opacity="0.15"/>
